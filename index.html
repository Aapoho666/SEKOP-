<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>SEKOPÄÄ</title>

<style>
body{
    background:#f2f2f2;
    text-align:center;
    font-family:Arial;
}

h1{
    color:red;
    font-size:60px;
}

button{
    font-size:30px;
    padding:15px 40px;
    margin:20px;
}
</style>
</head>

<body>

<h1>SEKOPÄÄ</h1>

<p>Tervetuloa peliin!</p>

<button onclick="startGame()">PLAY</button>
<br>
<div id="game" style="display:none;">
    <h2>Päivä 1</h2>
    <p>😊 Bob: Hei! Tervetuloa kotiin!</p>
</div>
<button onclick="settings()">SETTINGS</button>
<br>

<button onclick="quitGame()">QUIT</button>

<script>
function startGame(){
    alert("Peli alkaa! Bob tervehtii sinua 😊");
}

function settings(){
    alert("Asetukset tulevat myöhemmin!");
}

function quitGame(){
    alert("Kiitos pelaamisesta!");
}
</script>

</body>
</html>
