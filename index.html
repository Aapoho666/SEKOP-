<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>SEKOPÄÄ 3D</title>

<style>
body { margin:0; overflow:hidden; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    background:rgba(0,0,0,0.5);
    padding:10px;
}
</style>
</head>

<body>

<div id="ui">
<h2>SEKOPÄÄ 3D</h2>
<p>WASD = liiku</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshBasicMaterial({color:0x228B22})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// WALLS
const wallMat = new THREE.MeshBasicMaterial({color:0x888888});

const wall1 = new THREE.Mesh(new THREE.BoxGeometry(20,3,1), wallMat);
wall1.position.set(0,1.5,-10);
scene.add(wall1);

const wall2 = new THREE.Mesh(new THREE.BoxGeometry(20,3,1), wallMat);
wall2.position.set(0,1.5,10);
scene.add(wall2);

const wall3 = new THREE.Mesh(new THREE.BoxGeometry(1,3,20), wallMat);
wall3.position.set(-10,1.5,0);
scene.add(wall3);

const wall4 = new THREE.Mesh(new THREE.BoxGeometry(1,3,20), wallMat);
wall4.position.set(10,1.5,0);
scene.add(wall4);
const bob = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshBasicMaterial({color:0xff0000})
);

bob.position.set(0,1,-3);
scene.add(bob);
// PLAYER
camera.position.y = 2;

// MOVEMENT
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){
    if(keys["w"]) camera.position.z -= 0.1;
    if(keys["s"]) camera.position.z += 0.1;
    if(keys["a"]) camera.position.x -= 0.1;
    if(keys["d"]) camera.position.x += 0.1;
}

// LOOP
function animate(){
    requestAnimationFrame(animate);
    move();
    renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
