<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>SEKOPÄÄ</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

h1{
    color: red;
    font-size: 60px;
}

button{
    font-size: 30px;
    padding: 15px 40px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>SEKOPÄÄ</h1>

<div id="menu">
    <p>Tervetuloa peliin!</p>

    <button onclick="startGame()">PLAY</button>
</div>

<div id="game" style="display:none;">
    <h2>Päivä 1</h2>
    <p>😊 Bob: Hei! Olen vielä kiltti...</p>
</div>

<script>
function startGame(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
}
</script>

</body>
</html>
