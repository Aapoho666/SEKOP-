<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>SEKOPÄÄ</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}

h1{
    color:red;
    font-size:60px;
}

button{
    font-size:22px;
    padding:12px 25px;
    margin:10px;
}

#game{
    display:none;
}
.task{
    background:white;
    padding:10px;
    margin:10px auto;
    width:300px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>SEKOPÄÄ</h1>

<div id="menu">
    <p>Tervetuloa kotiin...</p>
    <button onclick="startGame()">PLAY</button>
</div>

<div id="game">
    <h2 id="dayText">Päivä 1</h2>

    <div id="bob">😊 Bob: Hei! Tervetuloa kotiin.</div>

    <div id="tasks">
        <div class="task">🧹 Kerää vaatteet</div>
        <div class="task">🍽️ Anna Bobille ruokaa</div>
        <div class="task">😴 Mene nukkumaan</div>
    </div>

    <button onclick="nextDay()">Seuraava päivä</button>
</div>

<script>
let day = 1;

function startGame(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
}

function nextDay(){
    day++;

    if(day < 10){
        document.getElementById("dayText").innerText = "Päivä " + day;

        document.getElementById("bob").innerText =
        "😊 Bob: Tee päivän tehtävät...";

    } else {
        document.getElementById("dayText").innerText = "PÄIVÄ 10";

        document.getElementById("bob").innerText =
        "😈 Bob: ...miksi et nukkunut...";

        document.getElementById("tasks").innerHTML = `
            <div class="task">😴 Mene nukkumaan</div>
            <div class="task">😴 Mene nukkumaan</div>
            <div class="task">😴 Mene nukkumaan</div>
            <div class="task">😴 Mene nukkumaan</div>
        `;

        document.body.style.background = "#000";
        document.body.style.color = "red";
    }
}
</script>

</body>
</html>
