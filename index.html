<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>SEKOPÄÄ 3D</title>

<style>
body { margin:0; overflow:hidden; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    background:rgba(0,0,0,0.5);
    padding:10px;
}
</style>
</head>

<body>

<div id="ui">
<h2>SEKOPÄÄ 3D</h2>
<p>WASD = liiku</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
    let yaw = 0;
let pitch = 0;

// 🔓 klikkaus vapauttaa hiiren peliin
document.body.addEventListener("click", async () => {
    await document.body.requestPointerLock();
});

// 🖱️ hiiren liike
document.addEventListener("mousemove", (event) => {
    if (document.pointerLockElement === document.body) {

        yaw -= event.movementX * 0.002;   // sivulle kääntyminen
        pitch -= event.movementY * 0.002; // ylös/alas

        pitch = Math.max(-1.5, Math.min(1.5, pitch));
    }
});

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshBasicMaterial({color:0x228B22})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// WALLS
const wallMat = new THREE.MeshBasicMaterial({color:0x888888});

const wall1 = new THREE.Mesh(new THREE.BoxGeometry(20,3,1), wallMat);
wall1.position.set(0,1.5,-10);
scene.add(wall1);

const wall2 = new THREE.Mesh(new THREE.BoxGeometry(20,3,1), wallMat);
wall2.position.set(0,1.5,10);
scene.add(wall2);

const wall3 = new THREE.Mesh(new THREE.BoxGeometry(1,3,20), wallMat);
wall3.position.set(-10,1.5,0);
scene.add(wall3);

const wall4 = new THREE.Mesh(new THREE.BoxGeometry(1,3,20), wallMat);
wall4.position.set(10,1.5,0);
scene.add(wall4);
const bob = new THREE.Group();

// 🟦 vartalo (vaaleansininen paita)
const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,1,0.4),
    new THREE.MeshBasicMaterial({color:0x66ccff})
);
body.position.y = 1;
bob.add(body);

// 🙂 pää
const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshBasicMaterial({color:0xffcc99})
);
head.position.y = 1.65;
bob.add(head);

// 👀 silmät
const eyeMat = new THREE.MeshBasicMaterial({color:0x000000});

const eye1 = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.08), eyeMat);
eye1.position.set(-0.12,1.7,0.26);
bob.add(eye1);

const eye2 = eye1.clone();
eye2.position.set(0.12,1.7,0.26);
bob.add(eye2);

// 👄 suu
const mouth = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.05,0.05),
    new THREE.MeshBasicMaterial({color:0x000000})
);
mouth.position.set(0,1.5,0.26);
bob.add(mouth);

// 🖐️ kädet
const armMat = new THREE.MeshBasicMaterial({color:0xffcc99});

const arm1 = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.7,0.2), armMat);
arm1.position.set(-0.45,1,0);
bob.add(arm1);

const arm2 = arm1.clone();
arm2.position.set(0.45,1,0);
bob.add(arm2);

// 👖 jalat (tummansininen)
const legMat = new THREE.MeshBasicMaterial({color:0x0b1a66});

const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.8,0.25), legMat);
leg1.position.set(-0.15,0.4,0);
bob.add(leg1);

const leg2 = leg1.clone();
leg2.position.set(0.15,0.4,0);
bob.add(leg2);

// 📍 paikka
bob.position.set(0,0,-3);

scene.add(bob);

// 🪑 SOHVA TÄHÄN ALLE
const sofa = new THREE.Mesh(
    new THREE.BoxGeometry(2,0.8,1),
    new THREE.MeshBasicMaterial({color:0x333333})
);

sofa.position.set(3,0.4,-2);

scene.add(sofa);
// PLAYER
camera.position.y = 2;

// MOVEMENT
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function move(){

    let speed = 0.1;

    let nextX = camera.position.x;
    let nextZ = camera.position.z;

    if(keys["w"]) nextZ -= speed;
    if(keys["s"]) nextZ += speed;
    if(keys["a"]) nextX -= speed;
    if(keys["d"]) nextX += speed;

    // 🧱 seinärajat (huoneen sisällä pysyminen)
    if(nextX > -9 && nextX < 9) camera.position.x = nextX;
    if(nextZ > -9 && nextZ < 9) camera.position.z = nextZ;
}

// LOOP
function animate(){
    requestAnimationFrame(animate);

    move();

    // 👇 TÄHÄN LISÄTÄÄN KAMERA-KOODI
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
